name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      runner:
        description: "Runner type"
        required: true
        default: "ubuntu-latest"
        type: choice
        options:
          - ubuntu-latest
          - self-hosted
  schedule:
    - cron: "0 6 * * *"

# Cancela ejecuciones en curso de la misma rama cuando llega un push nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runner-health:
    if: github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted'
    runs-on: self-hosted
    timeout-minutes: 2
    permissions: {}
    steps:
      - name: Connectivity check
        run: |
          echo "::notice::Runner: $(hostname) | Kernel: $(uname -r)"
          echo "::notice::Docker: $(docker --version 2>/dev/null || echo 'N/A')"
          curl -so /dev/null -w "api.github.com: %{http_code} (%{time_total}s)\n" \
            https://api.github.com
          curl -so /dev/null -w "broker: %{http_code} (%{time_total}s)\n" \
            https://broker.actions.githubusercontent.com
      - name: Host resources
        run: |
          echo "::notice::CPU: $(nproc) cores, load: $(uptime | awk -F'average:' '{print $2}' | xargs)"
          echo "::notice::RAM: $(free -h | awk '/^Mem:/{print $3 "/" $2 " used"}')"
          echo "::notice::Disk: $(df -h / | awk 'NR==2{print $3 "/" $2 " (" $5 ")"}')"
          if command -v nvidia-smi &>/dev/null; then
            echo "::notice::GPU: $(nvidia-smi --query-gpu=temperature.gpu,memory.used,memory.total --format=csv,noheader 2>/dev/null || echo 'N/A')"
          fi
      - name: Check broker health from logs
        run: |
          RECENT=$(find /actions-runner/_diag/ -name 'Runner_*.log' -mmin -3 | sort | tail -1)
          if [ -n "$RECENT" ]; then
            ERRORS=$(grep -c 'ERR.*BrokerServer' "$RECENT" 2>/dev/null || echo 0)
            if [ "$ERRORS" -gt 0 ]; then
              echo "::warning::Broker errors in last 3 min: ${ERRORS}"
            else
              echo "::notice::Broker healthy (0 errors)"
            fi
          else
            echo "::warning::No recent runner logs found"
          fi

  smoke:
    if: github.event_name == 'schedule'
    runs-on: self-hosted
    timeout-minutes: 2
    permissions: {}
    steps:
      - run: echo "ok" && exit 0

  quality:
    runs-on: ${{ (github.event_name == 'workflow_dispatch' && inputs.runner) || 'ubuntu-latest' }}
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high
      - run: npx license-checker --production --failOn "GPL-2.0;GPL-3.0;AGPL-3.0"
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:coverage
      - run: pnpm build

  e2e:
    runs-on: ${{ (github.event_name == 'workflow_dispatch' && inputs.runner) || 'ubuntu-latest' }}
    needs: quality
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm e2e
        env:
          CI: "true"

  # Despliegue a producción SOLO tras pasar quality + e2e. El auto-deploy de
  # Vercel desde Git está desactivado (gitProviderOptions.createDeployments),
  # por lo que este job es el único que promociona a prod.
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [quality, e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install Vercel CLI (pinned)
        # Fijado a 54.x: vercel@55.0.0 introduce una regresión
        # ("Could not retrieve Project Settings" en CI, OK localmente).
        # Issue upstream: vercel/vercel#10874
        run: pnpm add -g vercel@54.21.0
      - name: Deploy to production (Vercel)
        # --scope apunta al team. Sin él, vercel CLI puede fallar al
        # resolver el org si el token pertenece a un team y no a una
        # cuenta personal. Pasar VERCEL_TOKEN por env (no --token) para
        # que el CLI lo lea nativamente sin exponerlo en argv.
        run: vercel deploy --prod --yes --scope alexendros-team
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
