name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      runner:
        description: "Runner type"
        required: true
        default: "ubuntu-latest"
        type: choice
        options:
          - ubuntu-latest
          - self-hosted
  schedule:
    - cron: "0 6 * * *"

# Cancela ejecuciones en curso de la misma rama cuando llega un push nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runner-health:
    if: github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted'
    runs-on: self-hosted
    timeout-minutes: 2
    permissions: {}
    steps:
      - name: Connectivity check
        run: |
          echo "::notice::Runner: $(hostname) | Kernel: $(uname -r)"
          echo "::notice::Docker: $(docker --version 2>/dev/null || echo 'N/A')"
          curl -so /dev/null -w "api.github.com: %{http_code} (%{time_total}s)\n" \
            https://api.github.com
          curl -so /dev/null -w "broker: %{http_code} (%{time_total}s)\n" \
            https://broker.actions.githubusercontent.com
      - name: Host resources
        run: |
          echo "::notice::CPU: $(nproc) cores, load: $(uptime | awk -F'average:' '{print $2}' | xargs)"
          echo "::notice::RAM: $(free -h | awk '/^Mem:/{print $3 "/" $2 " used"}')"
          echo "::notice::Disk: $(df -h / | awk 'NR==2{print $3 "/" $2 " (" $5 ")"}')"
          if command -v nvidia-smi &>/dev/null; then
            echo "::notice::GPU: $(nvidia-smi --query-gpu=temperature.gpu,memory.used,memory.total --format=csv,noheader 2>/dev/null || echo 'N/A')"
          fi
      - name: Check broker health from logs
        run: |
          RECENT=$(find /actions-runner/_diag/ -name 'Runner_*.log' -mmin -3 | sort | tail -1)
          if [ -n "$RECENT" ]; then
            ERRORS=$(grep -c 'ERR.*BrokerServer' "$RECENT" 2>/dev/null || echo 0)
            if [ "$ERRORS" -gt 0 ]; then
              echo "::warning::Broker errors in last 3 min: ${ERRORS}"
            else
              echo "::notice::Broker healthy (0 errors)"
            fi
          else
            echo "::warning::No recent runner logs found"
          fi

  smoke:
    if: github.event_name == 'schedule'
    runs-on: self-hosted
    timeout-minutes: 2
    permissions: {}
    steps:
      - run: echo "ok" && exit 0

  quality:
    runs-on: ${{ (github.event_name == 'workflow_dispatch' && inputs.runner) || 'ubuntu-latest' }}
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e270a59839fb42c396496751331884e1c # v4.1.0
      - uses: actions/setup-node@49933eaac7f1ac24a9a6e681fbf8bdefd9b11f0 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Gitleaks — secret scan
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
      - name: Semgrep — SAST
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1 (archived, immutable)
        with:
          config: >-
            p/security-audit
            p/secrets
            p/typescript
            p/react
      - name: Dependency audit (moderate gate)
        run: pnpm audit --audit-level=moderate
      - run: npx license-checker --production --failOn "GPL-2.0;GPL-3.0;AGPL-3.0"
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:coverage
      - run: pnpm build

  e2e:
    runs-on: ${{ (github.event_name == 'workflow_dispatch' && inputs.runner) || 'ubuntu-latest' }}
    needs: quality
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e270a59839fb42c396496751331884e1c # v4.1.0
      - uses: actions/setup-node@49933eaac7f1ac24a9a6e681fbf8bdefd9b11f0 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm e2e
        env:
          CI: "true"

  # Deploy a producción:
  # Vercel auto-deploy (gitProviderOptions.createDeployments=enabled) se
  # encarga del deploy en cada push a main. El CI solo valida quality+e2e;
  # no hace deploy porque añadir un job aquí generaba doble deploy y
  # duplicaba tiempo de build. La protección contra pushes rotos sigue
  # activa via branch protection (ruleset: quality+e2e required).
  # Ver docs/devops/deploy.md para más contexto.
