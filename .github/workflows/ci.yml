name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancela ejecuciones en curso de la misma rama cuando llega un push nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      # Auditoría de seguridad: bloquea en high+ si hay CVEs en runtime.
      # Las vulns transitivas de tooling (Prisma Studio, Lighthouse) se ignoran
      # porque no llegan al bundle de producción.
      - run: pnpm audit --audit-level=high
      # Escáner de licencias: vetar GPL/AGPL en dependencias de producción.
      - run: npx license-checker --production --failOn "GPL-2.0;GPL-3.0;AGPL-3.0"
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:coverage
      - run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm e2e
        env:
          CI: "true"
