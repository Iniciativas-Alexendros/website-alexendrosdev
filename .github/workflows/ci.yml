name: CI

on:
  push:
    branches: [main]
  pull_request:

# Runner configurable: define la variable de repo CI_RUNNER (p. ej. "self-hosted")
# para usar el runner propio (infra-runners); por defecto, GitHub-hosted ubuntu-latest.
env:
  RUNNER: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}

# Cancela ejecuciones en curso de la misma rama cuando llega un push nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Visibilidad de CVE en dependencias. No bloqueante de momento: las vulns
      # vigentes son transitivas del tooling (Prisma Studio / Next), no del runtime
      # del producto. Subir a bloqueante (quitar continue-on-error) en cuanto el
      # árbol quede limpio en nivel `high`.
      - run: pnpm audit --audit-level=high
        continue-on-error: true
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:coverage
      - run: pnpm build

  e2e:
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    needs: quality
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm e2e
        env:
          CI: "true"
