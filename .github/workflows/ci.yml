name: CI

on:
  push:
    branches: [main]
  pull_request:

# Runner configurable: define la variable de repo CI_RUNNER (p. ej. "self-hosted")
# para usar el runner propio (infra-runners); por defecto, GitHub-hosted ubuntu-latest.
env:
  RUNNER: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}

jobs:
  quality:
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  e2e:
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm e2e
        env:
          CI: "true"
