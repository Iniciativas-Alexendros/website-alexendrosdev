name: Bug Report
description: Reportar un comportamiento incorrecto
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: Antes de abrir un issue, busca si ya existe uno similar.

  - type: input
    id: url
    attributes:
      label: URL afectada
      placeholder: https://alexendros.dev/...
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Descripción del bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
      placeholder: |
        1. Ir a '...'
        2. Hacer click en '...'
        3. Ver error
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Entorno
      placeholder: |
        - OS: macOS / Linux / Windows
        - Browser: Chrome / Firefox
        - Device: Desktop / Mobile
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Contexto adicional / Screenshots
    validations:
      required: false
