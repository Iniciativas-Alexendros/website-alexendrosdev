name: Reporte de bug
description: Informa de un fallo en el sitio o el código
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: ¿Qué ocurre?
      description: Descripción clara y concisa del fallo.
      placeholder: Al hacer X en /proyectos, la página muestra Y.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Pasos para reproducir
      description: Pasos numerados.
      placeholder: |
        1. Ir a ...
        2. Clic en ...
        3. Ver el error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportamiento esperado
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Área afectada
      options:
        - UI / Frontend
        - API / Backend
        - Build / CI
        - SEO / Accesibilidad
        - Infraestructura
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmaciones
      options:
        - label: Busqué issues abiertos similares.
          required: true
